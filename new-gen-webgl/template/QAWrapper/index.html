<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | {{{ PRODUCT_NAME }}}</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      body {
        margin: 0;
        background: #06060c;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #unity-container {
        width: 100%;
        height: 100%;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }
      #unity-canvas {
        background: #000;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        aspect-ratio: {{{ WIDTH }}} / {{{ HEIGHT }}};
        display: block;
      }
      #loading-overlay {
        position: absolute;
        inset: 0;
        background: #09090b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        color: #fff;
        transition: opacity 0.5s ease;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.1);
        border-left-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      #loading-text {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
      <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Loading game engine... 0%</div>
      </div>
    </div>

    <!-- Configure QA variables for the bridge script -->
    <script>
      window.QA_CONFIG = {
        // REPLACE WITH YOUR CONVEX HTTP DEPLOYMENT SITE URL (found in dashboard / console)
        convexUrl: "https://festive-mandrill-69.convex.site",
        // Project name identifier matches product name automatically unless hardcoded
        projectName: "{{{ PRODUCT_NAME }}}",
        autoStartSession: true
      };
    </script>
    <script src="TemplateData/qa-bridge.js"></script>

    <!-- Standard Unity WebGL Loader Script Integration -->
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingOverlay = document.querySelector("#loading-overlay");
      var loadingText = document.querySelector("#loading-text");

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_URL }}}";
      var config = {
        dataUrl: buildUrl + "/{{{ DATA_URL }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_URL }}}",
        codeUrl: buildUrl + "/{{{ CODE_URL }}}",
#if MEMORY_FILENAME
        memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: "{{{ COMPANY_NAME }}}",
        productName: "{{{ PRODUCT_NAME }}}",
        productVersion: "{{{ PRODUCT_VERSION }}}",
        // Enable preserveDrawingBuffer to allow canvas.toBlob screenshots
        webglContextAttributes: {
          preserveDrawingBuffer: true
        }
      };

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          loadingText.textContent = "Loading WebGL Assets... " + Math.round(100 * progress) + "%";
        }).then((unityInstance) => {
          loadingOverlay.style.opacity = 0;
          setTimeout(() => {
            loadingOverlay.style.display = "none";
          }, 500);
        }).catch((message) => {
          alert("WebGL loader failed: " + message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
