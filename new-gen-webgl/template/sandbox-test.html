<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity WebGL Simulation Sandbox</title>
  <link rel="stylesheet" href="QAWrapper/TemplateData/style.css">
  <style>
    body {
      margin: 0;
      background: #06060c;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fafafa;
    }
    #game-container {
      width: 800px;
      height: 450px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      border-radius: 8px;
      position: relative;
      background: #000;
      overflow: hidden;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #control-deck {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      background: rgba(24, 24, 27, 0.6);
      border: 1px solid rgba(63, 63, 70, 0.4);
      padding: 12px 20px;
      border-radius: 6px;
      z-index: 100;
    }
    .deck-btn {
      background: #1d4ed8;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .deck-btn:hover {
      background: #2563eb;
    }
    .deck-btn-danger {
      background: #b91c1c;
    }
    .deck-btn-danger:hover {
      background: #dc2626;
    }
    #deck-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="deck-title">Unity WebGL Sandbox Simulation</div>
  
  <div id="game-container">
    <canvas id="unity-canvas"></canvas>
  </div>

  <div id="control-deck">
    <button class="deck-btn" id="btn-draw-rect">Draw Bouncing Ball</button>
    <button class="deck-btn deck-btn-danger" id="btn-throw-error">Trigger Console Error</button>
    <button class="deck-btn deck-btn-danger" id="btn-throw-exception">Throw Runtime Exception</button>
  </div>

  <!-- Configure QA variables for the bridge script -->
  <script>
    window.QA_CONFIG = {
      convexUrl: "https://valuable-walrus-340.convex.site",
      projectName: "sandbox_simulation",
      autoStartSession: true
    };
  </script>
  <script src="QAWrapper/TemplateData/qa-bridge.js"></script>

  <script>
    // Canvas Game Simulation Render Loop
    const canvas = document.getElementById("unity-canvas");
    const ctx = canvas.getContext("2d");

    // Handle high DPI displays
    function resize() {
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    // Ball animation settings
    let x = 100;
    let y = 100;
    let dx = 3;
    let dy = 2.5;
    const radius = 15;
    let color = "#3b82f6";
    let isBouncing = true;

    function draw() {
      // Background clear
      ctx.fillStyle = "#09090b";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Render grid pattern
      ctx.strokeStyle = "rgba(63, 63, 70, 0.15)";
      ctx.lineWidth = 1;
      for (let i = 0; i < canvas.width; i += 40) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j < canvas.height; j += 40) {
        ctx.beginPath();
        ctx.moveTo(0, j);
        ctx.lineTo(canvas.width, j);
        ctx.stroke();
      }

      // Draw bouncing ball
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0; // reset
      ctx.closePath();

      // Title HUD inside game
      ctx.fillStyle = "#fafafa";
      ctx.font = "16px sans-serif";
      ctx.fillText("WebGL Game Running...", 20, 40);

      // Render stats
      ctx.fillStyle = "#a1a1aa";
      ctx.font = "12px monospace";
      ctx.fillText(`FPS: 60`, 20, 70);
      ctx.fillText(`Pos: (${Math.round(x)}, ${Math.round(y)})`, 20, 90);

      if (isBouncing) {
        // Bounce bounds check
        if (x + dx > canvas.width - radius || x + dx < radius) {
          dx = -dx;
          color = getRandomColor();
        }
        if (y + dy > canvas.height - radius || y + dy < radius) {
          dy = -dy;
          color = getRandomColor();
        }

        x += dx;
        y += dy;
      }

      requestAnimationFrame(draw);
    }

    function getRandomColor() {
      const colors = ["#3b82f6", "#10b981", "#ef4444", "#f59e0b", "#8b5cf6", "#ec4899"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    draw();

    // Setup control deck triggers
    document.getElementById("btn-draw-rect").onclick = () => {
      isBouncing = !isBouncing;
      document.getElementById("btn-draw-rect").textContent = isBouncing ? "Pause Animation" : "Resume Animation";
    };

    document.getElementById("btn-throw-error").onclick = () => {
      console.error("Physics collision exception: BoxCollider trigger failed at position (24.2, 0.4, -12.9) on gameObject 'EnemyMesh'");
    };

    document.getElementById("btn-throw-exception").onclick = () => {
      throw new Error("NullReferenceException: Object reference not set to an instance of an object at PlayerController.Update() line 42");
    };
  </script>
</body>
</html>
